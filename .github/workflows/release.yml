name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            glob: release/*.exe
          - os: macos-latest
            script: dist:mac
            glob: release/*.dmg
          - os: ubuntu-latest
            script: dist:linux
            glob: release/*.AppImage
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build installer
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: List downloaded files
        run: ls -R artifacts
      - name: Create release and attach installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Null Brand Builder ${GITHUB_REF_NAME}" \
            --generate-notes
