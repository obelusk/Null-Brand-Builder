name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test (Linux, headless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libgbm1 libatk-bridge2.0-0 libgtk-3-0
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2
      - name: Run headless smoke test
        # Ubuntu 24.04 restricts unprivileged user namespaces, which breaks Chromium's
        # sandbox. Disable it at startup (env is read before the sandbox check aborts;
        # the --no-sandbox arg is a backup). Fine for a throwaway headless test process.
        run: xvfb-run -a npm run test:smoke -- --no-sandbox
        env:
          ELECTRON_DISABLE_SANDBOX: 1

  build:
    name: Build (${{ matrix.os }})
    needs: smoke-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact: NullBrandBuilder-Windows
            glob: release/*.exe
          - os: macos-latest
            script: dist:mac
            artifact: NullBrandBuilder-macOS
            glob: release/*.dmg
          - os: ubuntu-latest
            script: dist:linux
            artifact: NullBrandBuilder-Linux
            glob: release/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.script }}
        env:
          # Build unsigned — no certificates configured. Remove/replace when signing is added.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
